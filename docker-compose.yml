services:
    via-bot:
        build: .
        container_name: Via-bot
        restart: unless-stopped
        env_file:
            - ./qq.env
        volumes:
            - ./:/app
        command: python via.py

    support_bot:
        build: .
        container_name: Support-bot
        restart: unless-stopped
        env_file:
            - ./qq.env
        volumes:
            - ./:/app
        command: python support.py
    web:
        image: nginx:alpine
        container_name: Via-web
        restart: unless-stopped
        volumes:
            - ./web:/usr/share/nginx/html
        ports:
            - "80:80"
