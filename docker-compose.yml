services:
    via-bot:
        build: .
        container_name: via-bot
        restart: unless-stopped
        env_file:
            - ./qq.env
        volumes:
            - ./:/app
        command: python via.py

    support_bot:
        build: .
        container_name: support-bot
        restart: unless-stopped
        env_file:
            - ./qq.env
        volumes:
            - ./:/app
        command: python support.py
    web:
        image: nginx:alpine
        container_name: via-web
        restart: unless-stopped
        env_file:
            - ./qq.env
        volumes:
            - ./web:/usr/share/nginx/html
            - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
            - /root/cert:/root/cert:ro
        command: |
            /bin/sh -c "
            export DOMAIN=$(echo $$DOMAIN | sed -e 's|^https://||' -e 's|^http://||' -e 's|/$$||');
            rm -rf /etc/nginx/ssl /etc/nginx/ssl-sub
            if [ -d /root/cert/$$DOMAIN ]; then
                ln -s /root/cert/$$DOMAIN /etc/nginx/ssl
            fi
            if [ -d /root/cert/sub.$$DOMAIN ]; then
                ln -s /root/cert/sub.$$DOMAIN /etc/nginx/ssl-sub
            fi

            printf 'window.APP_CONFIG = {\n  SUPPORT_BOT_URL: \"%s\",\n  MAIN_BOT_URL: \"%s\"\n};\n' \"$${SUPPORT_BOT_URL}\" \"$${MAIN_BOT_URL}\" > /usr/share/nginx/html/config.js
            exec /docker-entrypoint.sh nginx -g 'daemon off;'
            "
        ports:
            - "80:80"
            - "443:443"
